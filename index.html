<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ADHD OS"/>
<title>ADHD OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;--s0:#0e0e0e;--s1:#141414;--s2:#1c1c1c;--s3:#242424;
  --border:#2e2e2e;--border2:#3a3a3a;
  --accent:#c9f53b;--accent2:#a8d420;
  --work:#60b3ff;--work-bg:#0d1f2f;
  --personal:#ff8c5a;--personal-bg:#2a1208;
  --done:#50e89a;--text:#f5f5f5;--text2:#a0a0a0;--text3:#606060;
  --danger:#ff5252;--radius:14px;--radius-sm:9px;
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden}
input,button,select,textarea{font-family:inherit;-webkit-appearance:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
select option{background:#1a1a1a}

/* ── SETUP ── */
.setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(–bg)}
.setup-card{background:var(–s1);border:1px solid var(–border);border-radius:20px;padding:36px 28px;max-width:440px;width:100%}
.setup-wordmark{font-family:‘Syne’,sans-serif;font-size:22px;font-weight:800;color:var(–accent);letter-spacing:-.5px;margin-bottom:4px}
.setup-headline{font-size:17px;font-weight:600;color:var(–text);margin-bottom:8px}
.setup-body{font-size:13px;color:var(–text2);line-height:1.65;margin-bottom:24px}
.field-label{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;color:var(–text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.setup-input{width:100%;background:var(–s0);border:1px solid var(–border);border-radius:var(–radius-sm);padding:11px 14px;color:var(–text);font-size:16px;outline:none;margin-bottom:14px;transition:border-color .2s}
.setup-input:focus{border-color:var(–accent)}
.setup-cta{width:100%;background:var(–accent);color:#000;border:none;border-radius:var(–radius-sm);padding:13px;font-weight:700;font-size:14px;cursor:pointer;font-family:‘Syne’,sans-serif;letter-spacing:.3px;transition:opacity .15s}
.setup-cta:disabled{opacity:.45;cursor:not-allowed}
.setup-err{font-size:12px;color:var(–danger);margin-top:10px;display:none;line-height:1.5}
.setup-note{font-size:11px;color:var(–text3);margin-top:16px;text-align:center;line-height:1.6}
.setup-toggle{font-size:12px;color:var(–text3);margin-top:14px;text-align:center;cursor:pointer}
.setup-toggle span{color:var(–accent);text-decoration:underline;cursor:pointer}
.setup-divider{height:1px;background:var(–border);margin:20px 0}

/* ── HEADER ── */
#header{border-bottom:1px solid var(–border);padding:13px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;background:rgba(8,8,8,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:100}
.wordmark{font-family:‘Syne’,sans-serif;font-weight:800;font-size:17px;color:var(–accent);letter-spacing:-.3px}
.wordmark-sub{font-size:10px;color:var(–text3);font-family:‘JetBrains Mono’,monospace;letter-spacing:.5px;margin-top:1px}
.hdr-spacer{flex:1}
.sync-pill{display:flex;align-items:center;gap:5px;font-family:‘JetBrains Mono’,monospace;font-size:10px;padding:5px 10px;border-radius:20px;border:1px solid var(–border);background:var(–s1);cursor:pointer;transition:all .2s;user-select:none}
.sync-dot{width:6px;height:6px;border-radius:50%;transition:all .3s;flex-shrink:0}
.gear-btn{background:none;border:none;color:var(–text3);cursor:pointer;font-size:15px;padding:4px;line-height:1;transition:color .2s}
.gear-btn:hover{color:var(–text2)}

/* ── TABS ── */
#tabs{display:flex;border-bottom:1px solid var(–border);overflow-x:auto;padding:0 14px;scrollbar-width:none;background:var(–bg);position:sticky;top:49px;z-index:99}
#tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;padding:11px 13px;cursor:pointer;font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;color:var(–text3);border-bottom:2px solid transparent;transition:color .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;letter-spacing:.5px}
.tab.on{color:var(–accent);border-bottom-color:var(–accent)}
.tab-badge{background:var(–accent);color:#000;border-radius:8px;padding:1px 5px;font-size:9px;font-weight:700}

/* ── LAYOUT ── */
#main{max-width:680px;margin:0 auto;padding:18px 14px 100px}
.section{display:flex;flex-direction:column;gap:14px}

/* ── CARDS ── */
.card{background:var(–s1);border:1px solid var(–border);border-radius:var(–radius);overflow:hidden}
.card-hdr{padding:13px 16px;border-bottom:1px solid var(–border);display:flex;justify-content:space-between;align-items:center}
.card-title{font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:600;color:var(–text3);letter-spacing:1px}
.card-title.hi{color:var(–accent)}
.card-hint{font-size:11px;color:var(–text3)}

/* ── CLOCK ── */
.clock-card{background:linear-gradient(135deg,#0e0e0e 0%,#111700 100%);border:1px solid var(–border);border-radius:var(–radius);padding:22px 20px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;position:relative;overflow:hidden}
.clock-card::before{content:’’;position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(201,245,59,.06) 0%,transparent 70%);pointer-events:none}
.clock-val{font-family:‘Syne’,sans-serif;font-size:44px;font-weight:800;color:var(–accent);line-height:1;letter-spacing:-2px}
.clock-date{font-size:12px;color:var(–text3);margin-top:5px;font-family:‘JetBrains Mono’,monospace;letter-spacing:.3px}
.pct-val{font-family:‘Syne’,sans-serif;font-size:36px;font-weight:800;color:var(–text);text-align:right;line-height:1}
.pct-lbl{font-size:11px;color:var(–text3);text-align:right;margin-top:3px}
.pct-tags{display:flex;gap:10px;margin-top:8px;justify-content:flex-end}
.pct-tag{font-size:11px;font-family:‘JetBrains Mono’,monospace}
.prog-wrap{height:2px;background:var(–s3);border-radius:1px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(–accent2),var(–accent));border-radius:1px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── TASKS ── */
.task{display:flex;align-items:center;gap:10px;padding:12px 16px;transition:background .12s;position:relative}
.task:active{background:var(–s2)}
.task.faded{opacity:.38}
.task.faded .task-txt{text-decoration:line-through}
.chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(–border2);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk.on{border-color:var(–done);background:rgba(80,232,154,.12)}
.chk-mark{color:var(–done);font-size:12px;font-weight:700;display:none}
.chk.on .chk-mark{display:block}
.task-txt{flex:1;font-size:14px;color:var(–text);line-height:1.4}
.tag{font-size:9px;font-weight:600;padding:3px 7px;border-radius:4px;letter-spacing:.8px;font-family:‘JetBrains Mono’,monospace;flex-shrink:0}
.tw{background:var(–work-bg);color:var(–work)}
.tp{background:var(–personal-bg);color:var(–personal)}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.del{background:none;border:none;color:var(–danger);cursor:pointer;font-size:18px;padding:0 2px;opacity:0;line-height:1;transition:opacity .15s;flex-shrink:0}
.task:hover .del{opacity:.5}
@media(hover:none){.del{opacity:.3}}
.task+.task{border-top:1px solid var(–border)}
.pri-label{padding:8px 16px 4px;font-size:9px;color:var(–text3);font-family:‘JetBrains Mono’,monospace;letter-spacing:1px;display:flex;align-items:center;gap:6px;text-transform:uppercase}

/* ── BRAIN DUMP COMPOSER ── */
.dump-composer{padding:14px 16px;border-bottom:1px solid var(–border);display:flex;flex-direction:column;gap:10px}
.dump-textarea{width:100%;background:var(–s0);border:1.5px solid var(–border);border-radius:10px;padding:12px 14px;color:var(–text);font-size:16px;outline:none;resize:none;min-height:52px;line-height:1.5;transition:border-color .2s}
.dump-textarea:focus{border-color:var(–accent)}
.dump-composer-row{display:flex;gap:8px;align-items:center}
.pill-sel{background:var(–s2);border:1px solid var(–border);border-radius:20px;font-size:11px;padding:6px 12px;color:var(–text2);font-family:‘JetBrains Mono’,monospace;cursor:pointer;height:34px;transition:all .15s}
.pill-sel.cat-work{color:var(–work);border-color:var(–work-bg);background:var(–work-bg)}
.pill-sel.cat-personal{color:var(–personal);border-color:var(–personal-bg);background:var(–personal-bg)}
.dump-add-btn{margin-left:auto;background:var(–accent);color:#000;border:none;border-radius:20px;padding:0 18px;font-weight:700;font-size:12px;cursor:pointer;font-family:‘JetBrains Mono’,monospace;height:34px;letter-spacing:.3px;transition:opacity .15s;white-space:nowrap;flex-shrink:0}
.dump-add-btn:active{opacity:.75}

/* ── INLINE ADD ── */
.inline-add{padding:12px 16px;border-top:1px solid var(–border);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.inline-input{flex:1 1 160px;min-width:0;background:var(–s0);border:1.5px solid var(–border);border-radius:var(–radius-sm);padding:9px 12px;color:var(–text);font-size:16px;outline:none;transition:border-color .2s}
.inline-input:focus{border-color:var(–accent)}
.sm-sel{background:var(–s2);border:1px solid var(–border);border-radius:var(–radius-sm);font-size:11px;padding:0 10px;font-family:‘JetBrains Mono’,monospace;cursor:pointer;height:36px;color:var(–text2)}
.add-btn{background:var(–accent);color:#000;border:none;border-radius:var(–radius-sm);padding:0 16px;font-weight:700;font-size:12px;cursor:pointer;font-family:‘JetBrains Mono’,monospace;height:36px;letter-spacing:.3px;white-space:nowrap;flex-shrink:0}

/* ── PULL ROW ── */
.pull-row{display:flex;align-items:center;padding:11px 16px;gap:10px;border-top:1px solid var(–border)}
.pull-row:first-child{border-top:none}
.pull-txt{flex:1;font-size:13px;color:var(–text2)}
.pull-btn{background:rgba(201,245,59,.1);color:var(–accent);border:1px solid rgba(201,245,59,.2);border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;font-weight:600;font-family:‘JetBrains Mono’,monospace;white-space:nowrap;transition:background .15s}
.pull-btn:active{background:rgba(201,245,59,.2)}

/* ── ANCHOR ── */
.anchor{display:flex;align-items:center;gap:14px;padding:14px 16px}
.anchor+.anchor{border-top:1px solid var(–border)}
.anchor-icon{font-size:18px;width:32px;height:32px;background:var(–s2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.anchor-lbl{font-size:14px;font-weight:600;color:var(–text)}
.anchor-desc{font-size:12px;color:var(–text3);margin-top:1px}
.anchor-time{font-family:‘JetBrains Mono’,monospace;font-size:12px;color:var(–accent);margin-left:auto;white-space:nowrap}

/* ── HERO CARDS ── */
.hero-card{border-radius:var(–radius);padding:20px;position:relative;overflow:hidden}
.dump-hero{background:linear-gradient(135deg,#111400 0%,#0e0e0e 100%);border:1px solid var(–border)}
.work-hero{background:linear-gradient(135deg,var(–work-bg) 0%,#0a0a0a 100%);border:1px solid rgba(96,179,255,.12)}
.pers-hero{background:linear-gradient(135deg,var(–personal-bg) 0%,#0a0a0a 100%);border:1px solid rgba(255,140,90,.12)}
.week-hero{background:linear-gradient(135deg,#0e1410 0%,#0a0a0a 100%);border:1px solid rgba(201,245,59,.1)}
.hero-title{font-family:‘Syne’,sans-serif;font-size:22px;font-weight:800;letter-spacing:-.3px}
.hero-sub{font-size:13px;color:var(–text3);margin-top:4px}
.hero-stats{display:flex;gap:14px;margin-top:14px;flex-wrap:wrap}
.hero-stat{font-size:12px;font-family:‘JetBrains Mono’,monospace}

/* ── WEEKLY ── */
.big-stat{font-family:‘Syne’,sans-serif;font-size:32px;font-weight:800;line-height:1}
.big-stat-lbl{font-size:11px;color:var(–text3);margin-top:2px;font-family:‘JetBrains Mono’,monospace}
.review-row{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;transition:background .12s}
.review-row+.review-row{border-top:1px solid var(–border)}
.review-row:active{background:var(–s2)}
.review-row.done{opacity:.38}
.review-row.done .review-txt{text-decoration:line-through}
.review-txt{font-size:14px;color:var(–text);flex:1}
.reminder{display:flex;gap:12px;padding:10px 0;align-items:flex-start}
.reminder+.reminder{border-top:1px solid var(–border)}
.rem-icon{font-size:15px;flex-shrink:0;width:28px;height:28px;background:var(–s2);border-radius:7px;display:flex;align-items:center;justify-content:center}
.rem-txt{font-size:13px;color:var(–text3);line-height:1.5}

/* ── EMPTY ── */
.empty{padding:36px 20px;text-align:center;color:var(–text3);font-size:13px;line-height:1.6}
.empty-icon{font-size:28px;margin-bottom:8px}

/* ── MISC ── */
.clear-btn{background:none;border:1px solid var(–border);border-radius:var(–radius-sm);color:var(–text3);font-size:10px;padding:5px 10px;cursor:pointer;font-family:‘JetBrains Mono’,monospace;letter-spacing:.5px}
.loading-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.loading-logo{font-family:‘Syne’,sans-serif;font-size:28px;font-weight:800;color:var(–accent);letter-spacing:-.5px}
.loading-sub{font-family:‘JetBrains Mono’,monospace;font-size:11px;color:var(–text3);letter-spacing:1px}
.spinner{width:20px;height:20px;border:2px solid var(–border2);border-top-color:var(–accent);border-radius:50%;animation:spin .7s linear infinite;margin-top:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

</head>
<body>
<div id="app">
  <div class="loading-wrap">
    <div class="loading-logo">ADHD OS</div>
    <div class="loading-sub">LOADING</div>
    <div class="spinner"></div>
  </div>
</div>

<script>
// ══════════ CONFIG — set your worker URL after deploying ══════════
// Replace this with your actual worker URL, e.g.:
// const WORKER = "adhd-os-sync.mattrossi.workers.dev";
const WORKER = "https://adhd-os-sync.mattrossi.workers.dev";

const LS_CREDS = "adhd-os-cf-v1";
const LS_CACHE = "adhd-os-cf-cache-v1";

const DEFAULT = {
  tasks:[
    {id:1,text:"Review rack deployment checklist",category:"work",priority:"high",done:false,today:false},
    {id:3,text:"Check CDU telemetry alerts",category:"work",priority:"med",done:false,today:false},
  ],
  brainDump:[
    {id:2,text:"Buy groceries",category:"personal",priority:"med",done:false},
    {id:4,text:"Call dentist",category:"personal",priority:"low",done:false},
  ],
};

// ══════════ STATE ══════════
let creds       = null;  // { userId, token }
let S           = {tasks:[],brainDump:[],tab:"Today"};
let reviewState = {};
let saveTimer   = null;
let pollTimer   = null;

// ══════════ API ══════════
async function apiFetch(path, opts={}) {
  const headers = {"Content-Type":"application/json", ...(opts.headers||{})};
  if (creds?.token) headers["Authorization"] = `Bearer ${creds.token}`;
  const r = await fetch(`${WORKER}${path}`, {...opts, headers});
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    throw new Error(e.error || `HTTP ${r.status}`);
  }
  return r.json();
}

async function apiSetup(password) {
  return apiFetch("/setup", {method:"POST", body:JSON.stringify({password})});
}
async function apiLogin(userId, password) {
  return apiFetch("/login", {method:"POST", body:JSON.stringify({userId,password})});
}
async function apiGet() {
  return apiFetch("/data");
}
async function apiPut(data) {
  return apiFetch("/data", {method:"PUT", body:JSON.stringify(data)});
}

// ══════════ SYNC ══════════
function setSyncUI(s) {
  const dot = document.getElementById("sdot");
  const lbl = document.getElementById("slbl");
  if (!dot||!lbl) return;
  const M = {
    syncing: ["#c9f53b","none","SAVING…"],
    saved:   ["#50e89a","0 0 6px #50e89a","SYNCED"],
    error:   ["#ff5252","0 0 6px #ff5252","ERR"],
    offline: ["#ff8c5a","none","OFFLINE"],
  };
  const [c,sh,t] = M[s]||["#606060","none","SYNC"];
  dot.style.background=c; dot.style.boxShadow=sh; lbl.textContent=t; lbl.style.color=c;
}

function cache(d) { try{localStorage.setItem(LS_CACHE,JSON.stringify(d))}catch(_){} }
function loadCache() { try{const r=localStorage.getItem(LS_CACHE);return r?JSON.parse(r):null}catch(_){return null} }

async function push() {
  if (!creds) return;
  const d = {tasks:S.tasks,brainDump:S.brainDump};
  cache(d); setSyncUI("syncing");
  try { await apiPut(d); setSyncUI("saved"); }
  catch(e) { setSyncUI(navigator.onLine?"error":"offline"); }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setSyncUI("syncing");
  saveTimer = setTimeout(push, 900);
}

async function pull(silent=false) {
  if (!creds) return;
  if (!silent) setSyncUI("syncing");
  try {
    const r = await apiGet();
    S.tasks = r.tasks||[]; S.brainDump = r.brainDump||[];
    cache({tasks:S.tasks,brainDump:S.brainDump});
    renderTabContent(); updateBadges();
    setSyncUI("saved");
  } catch(e) {
    setSyncUI(navigator.onLine?"error":"offline");
  }
}

function startPoll() {
  clearInterval(pollTimer);
  pollTimer = setInterval(()=>pull(true), 30000);
}

// ══════════ CREDS ══════════
function loadCreds() { try{const r=localStorage.getItem(LS_CREDS);return r?JSON.parse(r):null}catch(_){return null} }
function saveCreds(c) { try{localStorage.setItem(LS_CREDS,JSON.stringify(c))}catch(_){} }

function resetSetup() {
  if (!confirm("Clear credentials from this device? Your cloud data stays safe.")) return;
  localStorage.removeItem(LS_CREDS);
  clearInterval(pollTimer); creds=null;
  renderSetup(false);
}

// ══════════ SETUP HANDLERS ══════════
let setupMode = "signup"; // "signup" | "login"

async function doSignup() {
  const pw  = document.getElementById("si-pw").value.trim();
  const pw2 = document.getElementById("si-pw2").value.trim();
  const err = document.getElementById("si-err");
  const btn = document.getElementById("si-btn");
  err.style.display="none";
  if (!pw || pw.length < 4) { showErr("Password must be at least 4 characters."); return; }
  if (pw !== pw2) { showErr("Passwords don't match."); return; }
  btn.disabled=true; btn.textContent="CREATING…";
  try {
    const res = await apiSetup(pw);
    creds = {userId:res.userId, token:res.token};
    saveCreds(creds);
    S.tasks=DEFAULT.tasks; S.brainDump=DEFAULT.brainDump;
    cache({tasks:S.tasks,brainDump:S.brainDump});
    await apiPut({tasks:S.tasks,brainDump:S.brainDump});
    renderShell(); renderTabContent(); setSyncUI("saved"); startPoll();
  } catch(e) {
    btn.disabled=false; btn.textContent="CREATE ACCOUNT";
    showErr("Could not connect to sync server. Check your worker URL is set correctly.");
  }
}

async function doLogin() {
  const uid = document.getElementById("si-uid").value.trim();
  const pw  = document.getElementById("si-pw-login").value.trim();
  const err = document.getElementById("si-err");
  const btn = document.getElementById("si-btn");
  err.style.display="none";
  if (!uid||!pw) { showErr("Enter your User ID and password."); return; }
  btn.disabled=true; btn.textContent="LOGGING IN…";
  try {
    const res = await apiLogin(uid, pw);
    creds = {userId:uid, token:res.token};
    saveCreds(creds);
    await pull(false);
    renderShell(); renderTabContent(); setSyncUI("saved"); startPoll();
  } catch(e) {
    btn.disabled=false; btn.textContent="LOG IN";
    showErr("Wrong User ID or password.");
  }
}

function showErr(m) { const e=document.getElementById("si-err"); if(e){e.textContent=m;e.style.display="block";} }

function toggleSetupMode() {
  setupMode = setupMode==="signup"?"login":"signup";
  renderSetup(false);
}

// ══════════ SETUP RENDER ══════════
function renderSetup(firstLoad=true) {
  const isSignup = setupMode==="signup";
  document.getElementById("app").innerHTML = `
  <div class="setup-wrap">
    <div class="setup-card">
      <div class="setup-wordmark">ADHD OS</div>
      <div class="setup-headline">${isSignup?"Create your account":"Welcome back"}</div>
      <div class="setup-body">${isSignup
        ? "Your data syncs across all devices via your Cloudflare Worker. Pick a password — you'll need it to log in on other devices."
        : "Enter your User ID and password to sync your data."
      }</div>

      ${isSignup ? `
        <div class="field-label">PASSWORD</div>
        <input class="setup-input" id="si-pw" type="password" placeholder="Min 4 characters" autocomplete="new-password"/>
        <div class="field-label">CONFIRM PASSWORD</div>
        <input class="setup-input" id="si-pw2" type="password" placeholder="Repeat password" autocomplete="new-password"
          onkeydown="if(event.key==='Enter')doSignup()"/>
        <button class="setup-cta" id="si-btn" onclick="doSignup()">CREATE ACCOUNT</button>
      ` : `
        <div class="field-label">USER ID</div>
        <input class="setup-input" id="si-uid" type="text" placeholder="Your User ID from first device" autocomplete="off"
          style="font-family:'JetBrains Mono',monospace;font-size:13px"/>
        <div class="field-label">PASSWORD</div>
        <input class="setup-input" id="si-pw-login" type="password" placeholder="Your password" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="setup-cta" id="si-btn" onclick="doLogin()">LOG IN</button>
      `}

      <div class="setup-err" id="si-err"></div>
      <div class="setup-toggle">${isSignup
        ? `Already have an account? <span onclick="toggleSetupMode()">Log in</span>`
        : `First time here? <span onclick="toggleSetupMode()">Create account</span>`
      }</div>

      ${isSignup ? `
      <div class="setup-divider"></div>
      <div class="setup-note" style="text-align:left">
        <strong style="color:var(--text2)">Before you start:</strong><br/>
        Make sure you've deployed the <code style="color:var(--accent);font-family:'JetBrains Mono',monospace">adhd-os-worker.js</code> file to Cloudflare Workers and updated the <code style="color:var(--accent);font-family:'JetBrains Mono',monospace">WORKER</code> URL at the top of this HTML file.
      </div>` : ""}
    </div>
  </div>`;
}

// ══════════ SHELL ══════════
function renderShell() {
  const tabs=["Today","Brain Dump","Work","Personal","Weekly Review"];
  const tb=S.tasks.filter(t=>t.today&&!t.done).length;
  const db=S.brainDump.filter(t=>!t.done).length;
  document.getElementById("app").innerHTML=`
  <div id="header">
    <div><div class="wordmark">ADHD OS</div><div class="wordmark-sub">EXTERNAL BRAIN</div></div>
    <div class="hdr-spacer"></div>
    <div class="sync-pill" onclick="pull()" title="Tap to sync now">
      <span class="sync-dot" id="sdot" style="background:var(--done);box-shadow:0 0 6px var(--done)"></span>
      <span id="slbl" style="color:var(--done)">SYNCED</span>
    </div>
    <button class="gear-btn" onclick="showUserInfo()" title="Account info">👤</button>
    <button class="gear-btn" onclick="resetSetup()" title="Sign out">⚙</button>
  </div>
  <div id="tabs">
    ${tabs.map(t=>{
      const b=t==="Today"?tb:t==="Brain Dump"?db:0;
      return `<button class="tab${S.tab===t?" on":""}" data-tab="${t}" onclick="switchTab('${t}')">${t.toUpperCase()}${b>0?`<span class="tab-badge">${b}</span>`:""}`;
    }).join("")}
  </div>
  <div id="main"><div id="tab-content" class="section"></div></div>`;
}

function showUserInfo() {
  if (!creds) return;
  alert(`Your User ID:\n\n${creds.userId}\n\nUse this + your password to log in on other devices.`);
}

// ══════════ TABS ══════════
function switchTab(t) {
  S.tab=t;
  document.querySelectorAll(".tab").forEach(el=>el.classList.toggle("on",el.dataset.tab===t));
  renderTabContent();
}

function renderTabContent() {
  const el=document.getElementById("tab-content");
  if(!el)return;
  const map={"Today":renderToday,"Brain Dump":renderDump,"Work":()=>renderList("work"),"Personal":()=>renderList("personal"),"Weekly Review":renderWeekly};
  el.innerHTML=(map[S.tab]||renderToday)();
  const ta=document.getElementById("dump-ta");
  if(ta) ta.addEventListener("input",function(){this.style.height="auto";this.style.height=this.scrollHeight+"px"});
}

// ══════════ BADGES + PROGRESS ══════════
function updateBadges() {
  const tb=S.tasks.filter(t=>t.today&&!t.done).length;
  const db=S.brainDump.filter(t=>!t.done).length;
  document.querySelectorAll(".tab").forEach(el=>{
    const t=el.dataset.tab;
    let b=el.querySelector(".tab-badge");
    const count=t==="Today"?tb:t==="Brain Dump"?db:0;
    if(count>0){if(b)b.textContent=count;else el.insertAdjacentHTML("beforeend",`<span class="tab-badge">${count}</span>`);}
    else if(b)b.remove();
  });
}

function updateProgress() {
  const today=S.tasks.filter(t=>t.today);
  const pct=today.length?Math.round(today.filter(t=>t.done).length/today.length*100):0;
  const f=document.getElementById("prog-fill"); if(f)f.style.width=`${pct}%`;
  const v=document.getElementById("pct-val");   if(v)v.textContent=`${pct}%`;
}

// ══════════ MUTATIONS (surgical DOM) ══════════
function uid(){return Date.now()+Math.floor(Math.random()*9999)}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function priColor(p){return p==="high"?"var(--danger)":p==="med"?"var(--accent)":"var(--text3)"}
function tagHtml(c){return c==="work"?`<span class="tag tw">WORK</span>`:`<span class="tag tp">PERSONAL</span>`}
function priDot(p){return `<span class="pdot" style="background:${priColor(p)}"></span>`}

function taskHtml(t,{showTag=true,pool="tasks"}={}){
  return `<div class="task${t.done?" faded":""}" data-id="${t.id}">
    <button class="chk${t.done?" on":""}" onclick="toggle(${t.id},'${pool}')"><span class="chk-mark">✓</span></button>
    <span class="task-txt">${esc(t.text)}</span>
    ${showTag?tagHtml(t.category):""}
    ${t.priority?priDot(t.priority):""}
    <button class="del" onclick="del(${t.id},'${pool}')">×</button>
  </div>`;
}

function toggle(id,pool){
  S[pool]=S[pool].map(t=>t.id===id?{...t,done:!t.done}:t);
  const row=document.querySelector(`.task[data-id="${id}"]`);
  if(row){
    const t=S[pool].find(x=>x.id===id);
    row.classList.toggle("faded",t.done);
    row.querySelector(".chk").classList.toggle("on",t.done);
  }
  updateProgress();updateBadges();scheduleSave();
}

function del(id,pool){
  S[pool]=S[pool].filter(t=>t.id!==id);
  const row=document.querySelector(`.task[data-id="${id}"]`);
  if(row)row.remove();
  updateProgress();updateBadges();scheduleSave();
}

function dumpAdd(){
  const ta=document.getElementById("dump-ta");
  const cat=document.getElementById("dump-cat");
  const pri=document.getElementById("dump-pri");
  const text=(ta.value||"").trim();
  if(!text)return;
  const t={id:uid(),text,category:cat.value,priority:pri.value,done:false};
  S.brainDump=[...S.brainDump,t];
  const list=document.getElementById("dump-list");
  if(list){
    if(list.querySelector(".empty"))list.innerHTML="";
    const d=document.createElement("div");
    d.innerHTML=taskHtml(t,{pool:"brainDump"});
    list.appendChild(d.firstElementChild);
  }
  ta.value="";ta.style.height="auto";ta.focus();
  updateBadges();scheduleSave();
}

function inlineAdd(pool,todayFlag){
  const inp=document.getElementById(`ii-${pool}`);
  const cat=document.getElementById(`ic-${pool}`);
  const pri=document.getElementById(`ip-${pool}`);
  const text=(inp.value||"").trim();
  if(!text)return;
  const t={id:uid(),text,category:cat?cat.value:"work",priority:pri?pri.value:"med",done:false,today:!!todayFlag};
  if(pool==="brainDump"){S.brainDump=[...S.brainDump,t];}
  else{S.tasks=[...S.tasks,t];}
  const list=document.getElementById(`tl-${pool}`);
  if(list){
    if(list.querySelector(".empty"))list.innerHTML="";
    const d=document.createElement("div");
    d.innerHTML=taskHtml(t,{showTag:pool!=="work"&&pool!=="personal",pool:"tasks"});
    list.appendChild(d.firstElementChild);
  }
  inp.value="";inp.focus();
  updateBadges();updateProgress();scheduleSave();
}

function pullToToday(id){
  if(S.tasks.filter(t=>t.today).length>=3)return;
  const t=S.brainDump.find(x=>x.id===id);
  if(!t)return;
  S.brainDump=S.brainDump.filter(x=>x.id!==id);
  S.tasks=[...S.tasks,{...t,today:true,done:false}];
  scheduleSave();renderTabContent();updateBadges();
}

function clearDone(){
  S.brainDump=S.brainDump.filter(t=>!t.done);
  scheduleSave();renderTabContent();updateBadges();
}

function toggleReview(i){
  reviewState[i]=!reviewState[i];
  const row=document.getElementById(`rr-${i}`);
  const box=document.getElementById(`rb-${i}`);
  if(!row)return;
  row.classList.toggle("done",reviewState[i]);
  box.classList.toggle("on",reviewState[i]);
}

// ══════════ TAB RENDERERS ══════════
function renderToday(){
  const today=S.tasks.filter(t=>t.today);
  const pct=today.length?Math.round(today.filter(t=>t.done).length/today.length*100):0;
  const now=new Date();
  const timeStr=now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const dateStr=now.toLocaleDateString([],{weekday:"long",month:"long",day:"numeric"});
  const canAdd=today.length<3;
  const pending=S.brainDump.filter(t=>!t.done);
  return `
  <div class="clock-card">
    <div><div class="clock-val" id="live-clock">${timeStr}</div><div class="clock-date">${dateStr}</div></div>
    <div>
      <div class="pct-val" id="pct-val">${pct}%</div>
      <div class="pct-lbl">done today</div>
      <div class="pct-tags">
        <span class="pct-tag" style="color:var(--work)">✦ ${today.filter(t=>t.done&&t.category==="work").length} work</span>
        <span class="pct-tag" style="color:var(--personal)">✦ ${today.filter(t=>t.done&&t.category==="personal").length} personal</span>
      </div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:${pct}%"></div></div>
  <div class="card">
    <div class="card-hdr">
      <span class="card-title hi">TODAY'S 3 — ${today.length}/3</span>
      ${canAdd?'<span class="card-hint">Pull from Brain Dump ↓</span>':""}
    </div>
    <div id="tl-today">
      ${today.length===0?`<div class="empty"><div class="empty-icon">📋</div>No tasks yet.<br>Add one below or pull from Brain Dump.</div>`:today.map(t=>taskHtml(t,{pool:"tasks"})).join("")}
    </div>
    ${canAdd?`<div class="inline-add">
      <input class="inline-input" id="ii-today" placeholder="Add a task…" onkeydown="if(event.key==='Enter')inlineAdd('today',true)"/>
      <select class="sm-sel" id="ic-today"><option value="work">WORK</option><option value="personal">PERSONAL</option></select>
      <select class="sm-sel" id="ip-today"><option value="high">HIGH</option><option value="med" selected>MED</option><option value="low">LOW</option></select>
      <button class="add-btn" onclick="inlineAdd('today',true)">ADD</button>
    </div>`:""}
  </div>
  ${pending.length>0&&canAdd?`<div class="card">
    <div class="card-hdr"><span class="card-title">PULL FROM BRAIN DUMP</span></div>
    ${pending.slice(0,6).map(t=>`<div class="pull-row"><span class="pull-txt">${esc(t.text)}</span>${tagHtml(t.category)}<button class="pull-btn" onclick="pullToToday(${t.id})">→ TODAY</button></div>`).join("")}
  </div>`:""}
  <div class="card">
    <div class="card-hdr"><span class="card-title">TIME ANCHORS</span></div>
    ${[{time:"8:00 AM",label:"Morning anchor",desc:"Pick your 3 tasks",icon:"☀️"},{time:"12:00 PM",label:"Midday check-in",desc:"2 min reprioritize",icon:"⚡"},{time:"5:00 PM",label:"End of day",desc:"Hard stop. Close out.",icon:"🔒"}].map(a=>`
    <div class="anchor"><div class="anchor-icon">${a.icon}</div><div><div class="anchor-lbl">${a.label}</div><div class="anchor-desc">${a.desc}</div></div><span class="anchor-time">${a.time}</span></div>`).join("")}
  </div>`;
}

function renderDump(){
  const bd=S.brainDump;
  const doneCount=bd.filter(t=>t.done).length;
  return `
  <div class="hero-card dump-hero">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div class="hero-title" style="color:var(--accent)">BRAIN DUMP</div><div class="hero-sub">Don't filter. Don't judge. Just capture.</div></div>
      ${doneCount>0?`<button class="clear-btn" onclick="clearDone()">CLEAR ${doneCount} DONE</button>`:""}
    </div>
    <div class="hero-stats">
      <span class="hero-stat" style="color:var(--work)">● ${bd.filter(t=>t.category==="work").length} work</span>
      <span class="hero-stat" style="color:var(--personal)">● ${bd.filter(t=>t.category==="personal").length} personal</span>
      <span class="hero-stat" style="color:var(--text3)">● ${doneCount} done</span>
    </div>
  </div>
  <div class="card">
    <div class="dump-composer">
      <textarea class="dump-textarea" id="dump-ta" placeholder="What's in your head right now…" rows="2"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();dumpAdd()}"></textarea>

```
  <div class="dump-composer-row">
    <select class="pill-sel cat-work" id="dump-cat" onchange="this.className='pill-sel '+(this.value==='work'?'cat-work':'cat-personal')">
      <option value="work">WORK</option><option value="personal">PERSONAL</option>
    </select>
    <select class="pill-sel" id="dump-pri" style="color:var(--text2)">
      <option value="high">HIGH</option><option value="med" selected>MED</option><option value="low">LOW</option>
    </select>
    <button class="dump-add-btn" onclick="dumpAdd()">CAPTURE ↵</button>
  </div>
</div>
<div id="dump-list">
  ${bd.length===0?`<div class="empty"><div class="empty-icon">🧠</div>Your brain dump is empty.<br>Type above and hit Enter.</div>`:bd.map(t=>taskHtml(t,{pool:"brainDump"})).join("")}
</div>
```

  </div>`;
}

function renderList(cat){
const filtered=S.tasks.filter(t=>t.category===cat&&!t.today);
const color=cat===“work”?“var(–work)”:“var(–personal)”;
const heroClass=cat===“work”?“work-hero”:“pers-hero”;
const groups={high:[],med:[],low:[]};
filtered.forEach(t=>(groups[t.priority||“med”]||groups.med).push(t));
return `

  <div class="hero-card ${heroClass}">
    <div class="hero-title" style="color:${color}">${cat.toUpperCase()}</div>
    <div class="hero-sub">${filtered.length} tasks · ${filtered.filter(t=>t.done).length} done</div>
  </div>
  <div class="card">
    <div class="inline-add">
      <input class="inline-input" id="ii-${cat}" placeholder="Add task… (Enter)" onkeydown="if(event.key==='Enter')inlineAdd('${cat}',false)"/>
      <select class="sm-sel" id="ip-${cat}"><option value="high">HIGH</option><option value="med" selected>MED</option><option value="low">LOW</option></select>
      <button class="add-btn" onclick="inlineAdd('${cat}',false)">ADD</button>
    </div>
    <div id="tl-${cat}">
      ${["high","med","low"].map(pri=>groups[pri].length>0?`<div class="pri-label">${priDot(pri)} ${pri.toUpperCase()}</div>${groups[pri].map(t=>taskHtml(t,{showTag:false,pool:"tasks"})).join("")}`:"").join("")}
      ${filtered.length===0?`<div class="empty"><div class="empty-icon">${cat==="work"?"💼":"🏠"}</div>No tasks yet.</div>`:""}
    </div>
  </div>`;
}

function renderWeekly(){
const all=[…S.tasks,…S.brainDump];
const pct=all.length?Math.round(all.filter(t=>t.done).length/all.length*100):0;
const wT=S.tasks.filter(t=>t.category===“work”);
const pT=S.tasks.filter(t=>t.category===“personal”);
const tips=[“Sort Brain Dump → Work and Personal lists”,“Check for overdue high-priority tasks”,“Reset your 3 time anchor alarms”,“What kept derailing you last week?”,“Clear done items from Brain Dump”];
return `

  <div class="hero-card week-hero">
    <div class="hero-title" style="color:var(--text)">WEEKLY REVIEW</div>
    <div class="hero-sub">Every Sunday or Monday. 10 minutes.</div>
    <div style="display:flex;gap:24px;flex-wrap:wrap;margin-top:18px">
      ${[{v:`${pct}%`,l:"overall",c:"var(--accent)"},{v:`${wT.filter(t=>t.done).length}/${wT.length}`,l:"work",c:"var(--work)"},{v:`${pT.filter(t=>t.done).length}/${pT.length}`,l:"personal",c:"var(--personal)"}].map(s=>`<div><div class="big-stat" style="color:${s.c}">${s.v}</div><div class="big-stat-lbl">${s.l}</div></div>`).join("")}
    </div>
  </div>
  <div class="card">
    <div class="card-hdr"><span class="card-title">REVIEW CHECKLIST</span></div>
    ${tips.map((tip,i)=>`<div class="review-row${reviewState[i]?" done":""}" id="rr-${i}" onclick="toggleReview(${i})"><div class="chk${reviewState[i]?" on":""}" id="rb-${i}" style="cursor:pointer;flex-shrink:0"><span class="chk-mark">✓</span></div><span class="review-txt" id="rt-${i}">${tip}</span></div>`).join("")}
  </div>
  <div class="card" style="padding:16px 16px 8px">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;margin-bottom:12px">ADHD REMINDERS</div>
    ${[{icon:"🧠",tip:"3 tasks max per day. Not 10. Three."},{icon:"⏱",tip:"Time blindness is real — use alarms, not willpower."},{icon:"👥",tip:"Body doubling: work near someone or use YouTube study streams."},{icon:"🔄",tip:"Transitions are hard. Give yourself 5 min between contexts."},{icon:"✅",tip:"Done > perfect. Messy progress beats perfect inaction."}].map(r=>`<div class="reminder"><div class="rem-icon">${r.icon}</div><div class="rem-txt">${r.tip}</div></div>`).join("")}
  </div>`;
}

// ══════════ CLOCK ══════════
setInterval(()=>{const el=document.getElementById(“live-clock”);if(el)el.textContent=new Date().toLocaleTimeString([],{hour:“2-digit”,minute:“2-digit”});},15000);
window.addEventListener(“online”, ()=>pull(false));
window.addEventListener(“offline”,()=>setSyncUI(“offline”));

// ══════════ BOOT ══════════
(async function boot(){
creds = loadCreds();
if (!creds) { renderSetup(true); return; }
const cached = loadCache();
if (cached) { S.tasks=cached.tasks||[]; S.brainDump=cached.brainDump||[]; }
renderShell(); renderTabContent(); setSyncUI(“syncing”);
await pull(false);
startPoll();
})();
</script>

</body>
</html>
