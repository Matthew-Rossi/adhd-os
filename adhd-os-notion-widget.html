<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ADHD OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #181818; --surface-h: #1f1f1f; --border: #2a2a2a;
    --accent: #e8ff47; --work: #4da6ff; --personal: #ff7b47; --done: #4dff91;
    --text: #f0f0f0; --muted: #666; --danger: #ff4d4d;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  select option { background: #1a1a1a; }
  button, input, select { font-family: inherit; }

  /* ── Setup screen ── */
  .setup-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .setup-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px 36px; max-width: 500px; width: 100%;
  }
  .setup-logo { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-bottom: 6px; }
  .setup-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .setup-steps { margin-bottom: 28px; display: flex; flex-direction: column; gap: 12px; }
  .setup-step { display: flex; gap: 12px; align-items: flex-start; }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #000; font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; font-family: 'DM Mono', monospace; }
  .step-text { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .step-text a { color: var(--accent); text-decoration: none; }
  .step-text a:hover { text-decoration: underline; }
  .setup-field-label { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1px; margin-bottom: 6px; }
  .setup-input { width: 100%; background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13px; outline: none; margin-bottom: 12px; }
  .setup-input:focus { border-color: var(--accent); }
  .setup-input.error { border-color: var(--danger); }
  .setup-btn { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 12px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: 0.5px; margin-top: 4px; }
  .setup-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .setup-error { font-size: 12px; color: var(--danger); margin-top: 8px; display: none; }
  .setup-note { font-size: 11px; color: var(--muted); margin-top: 16px; text-align: center; line-height: 1.5; }

  /* ── Header ── */
  .header { border-bottom: 1px solid var(--border); padding: 13px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .logo { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 15px; color: var(--accent); letter-spacing: 1px; }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
  .spacer { flex: 1; }
  .sync-badge {
    display: flex; align-items: center; gap: 5px;
    font-family: 'DM Mono', monospace; font-size: 10px; cursor: default;
    padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; transition: all 0.3s; }

  /* ── Tabs ── */
  .tabs { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; padding: 0 20px; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn { background: none; border: none; padding: 12px 13px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700; color: var(--muted); border-bottom: 2px solid transparent; transition: color 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; letter-spacing: 0.5px; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .badge { background: var(--accent); color: #000; border-radius: 10px; padding: 1px 5px; font-size: 9px; font-weight: 900; }

  /* ── Content ── */
  .content { max-width: 720px; margin: 0 auto; padding: 24px 20px 80px; display: flex; flex-direction: column; gap: 20px; }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .card-title { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px; }
  .card-title.accent { color: var(--accent); }
  .clock-card { background: linear-gradient(135deg,#181818 0%,#1b200a 100%); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  .clock { font-size: 40px; font-weight: 900; color: var(--accent); font-family: 'DM Mono', monospace; line-height: 1; }
  .date-str { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .pct { font-size: 32px; font-weight: 900; color: var(--text); font-family: 'DM Mono', monospace; text-align: right; }
  .pct-sub { color: var(--muted); font-size: 12px; text-align: right; }
  .pct-tags { display: flex; gap: 10px; margin-top: 6px; justify-content: flex-end; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }

  /* ── Tasks ── */
  .task-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; transition: background 0.15s; }
  .task-item:hover { background: var(--surface-h); }
  .task-item.done { opacity: 0.4; }
  .check-btn { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); background: transparent; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .check-btn.checked { border-color: var(--done); background: #4dff9122; }
  .check-icon { color: var(--done); font-size: 11px; font-weight: 900; display: none; }
  .check-btn.checked .check-icon { display: block; }
  .task-text { flex: 1; font-size: 14px; color: var(--text); }
  .task-item.done .task-text { text-decoration: line-through; }
  .del-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; padding: 0 4px; opacity: 0; line-height: 1; }
  .task-item:hover .del-btn { opacity: 0.6; }
  .tag { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 3px; letter-spacing: 1px; font-family: 'DM Mono', monospace; flex-shrink: 0; }
  .tag-work { background: #1a2d3d; color: var(--work); }
  .tag-personal { background: #3d1a0f; color: var(--personal); }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  /* ── Add bar ── */
  .add-bar { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .add-input { flex: 1 1 140px; min-width: 0; background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; }
  .add-input:focus { border-color: #444; }
  .add-select { background: #111; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; padding: 0 8px; font-family: 'DM Mono', monospace; cursor: pointer; height: 36px; }
  .add-btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 0 16px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: 'DM Mono', monospace; height: 36px; }

  /* ── Misc ── */
  .anchor-row { display: flex; align-items: center; gap: 16px; padding: 14px 18px; }
  .anchor-row + .anchor-row { border-top: 1px solid var(--border); }
  .anchor-time { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); margin-left: auto; white-space: nowrap; }
  .dump-row { display: flex; align-items: center; padding: 10px 14px; gap: 10px; border-bottom: 1px solid var(--border); }
  .pull-btn { background: #e8ff4722; color: var(--accent); border: 1px solid #e8ff4744; border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-weight: 700; font-family: 'DM Mono', monospace; }
  .check-row { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; }
  .check-row + .check-row { border-top: 1px solid var(--border); }
  .check-row.done-row { opacity: 0.4; }
  .review-text { font-size: 14px; color: var(--text); }
  .check-row.done-row .review-text { text-decoration: line-through; }
  .empty { padding: 32px; text-align: center; color: var(--muted); font-size: 14px; }
  .pri-group-label { padding: 8px 14px 4px; font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
  .stat-block { font-size: 30px; font-weight: 900; font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--muted); }
  .stats-row { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 16px; }
  .dump-header { background: linear-gradient(135deg,#181818,#1a1208); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .cat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .weekly-header { background: linear-gradient(135deg,#181818,#080f18); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
  .reminders-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .clear-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 11px; padding: 6px 12px; cursor: pointer; font-family: 'DM Mono', monospace; }
  .reminder-row { display: flex; gap: 12px; padding: 8px 0; }
  .reminder-row + .reminder-row { border-top: 1px solid var(--border); }
  .loading-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 14px; letter-spacing: 2px; flex-direction: column; gap: 12px; }
  .loading-sub { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .reset-link { font-size: 10px; color: var(--muted); cursor: pointer; font-family: 'DM Mono', monospace; text-decoration: underline; letter-spacing: 0.5px; }
  .reset-link:hover { color: var(--danger); }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════
const LS_CREDS   = "adhd-os-creds-v1";   // stores { apiKey, binId }
const LS_CACHE   = "adhd-os-cache-v1";   // offline cache
const JSONBIN_BASE = "https://api.jsonbin.io/v3";

const DEFAULT_DATA = {
  tasks: [
    { id: 1, text: "Review rack deployment checklist", category: "work", priority: "high", done: false, today: false },
    { id: 3, text: "Check CDU telemetry alerts",       category: "work", priority: "med",  done: false, today: false },
  ],
  brainDump: [
    { id: 2, text: "Buy groceries", category: "personal", priority: "med", done: false },
    { id: 4, text: "Call dentist",  category: "personal", priority: "low", done: false },
  ],
};

// ══════════════════════════════════════════════════════
//  RUNTIME STATE
// ══════════════════════════════════════════════════════
let creds    = null;   // { apiKey, binId }
let appState = { tasks: [], brainDump: [], activeTab: "Today" };
let syncStatus = "idle";   // idle | syncing | saved | error | offline
let saveTimer  = null;
let pollTimer  = null;
let lastRemoteVersion = null;  // used to detect remote changes

// ══════════════════════════════════════════════════════
//  JSONBIN API
// ══════════════════════════════════════════════════════
async function createBin(apiKey, data) {
  const r = await fetch(`${JSONBIN_BASE}/b`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Master-Key": apiKey, "X-Bin-Name": "adhd-os" },
    body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  return j.metadata.id;
}

async function readBin(apiKey, binId) {
  const r = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, {
    headers: { "X-Master-Key": apiKey },
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  lastRemoteVersion = j.metadata?.version ?? null;
  return j.record;
}

async function writeBin(apiKey, binId, data) {
  const r = await fetch(`${JSONBIN_BASE}/b/${binId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": apiKey },
    body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  lastRemoteVersion = j.metadata?.version ?? null;
}

// ══════════════════════════════════════════════════════
//  SYNC LOGIC
// ══════════════════════════════════════════════════════
function setSyncStatus(s) {
  syncStatus = s;
  const dot  = document.getElementById("sync-dot");
  const lbl  = document.getElementById("sync-lbl");
  if (!dot || !lbl) return;
  const map = {
    idle:    { color: "var(--muted)",    shadow: "none",                    text: "SYNC" },
    syncing: { color: "var(--accent)",   shadow: "none",                    text: "SYNCING…" },
    saved:   { color: "var(--done)",     shadow: "0 0 5px var(--done)",     text: "SYNCED" },
    error:   { color: "var(--danger)",   shadow: "0 0 5px var(--danger)",   text: "SYNC ERR" },
    offline: { color: "var(--personal)", shadow: "0 0 5px var(--personal)", text: "OFFLINE" },
  };
  const m = map[s] || map.idle;
  dot.style.background = m.color;
  dot.style.boxShadow  = m.shadow;
  lbl.textContent      = m.text;
  lbl.style.color      = m.color;
}

function cacheLocally(data) {
  try { localStorage.setItem(LS_CACHE, JSON.stringify(data)); } catch(_) {}
}

function loadCache() {
  try { const r = localStorage.getItem(LS_CACHE); return r ? JSON.parse(r) : null; } catch(_) { return null; }
}

async function pushToCloud() {
  if (!creds) return;
  const payload = { tasks: appState.tasks, brainDump: appState.brainDump };
  cacheLocally(payload);
  setSyncStatus("syncing");
  try {
    await writeBin(creds.apiKey, creds.binId, payload);
    setSyncStatus("saved");
  } catch(e) {
    setSyncStatus(navigator.onLine ? "error" : "offline");
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setSyncStatus("syncing");
  saveTimer = setTimeout(pushToCloud, 900);
}

async function pullFromCloud(silent = false) {
  if (!creds) return;
  if (!silent) setSyncStatus("syncing");
  try {
    const remote = await readBin(creds.apiKey, creds.binId);
    if (remote && remote.tasks) {
      appState.tasks     = remote.tasks;
      appState.brainDump = remote.brainDump || [];
      cacheLocally({ tasks: appState.tasks, brainDump: appState.brainDump });
      render();
    }
    setSyncStatus("saved");
  } catch(e) {
    setSyncStatus(navigator.onLine ? "error" : "offline");
  }
}

// Poll every 30s for changes from other devices
function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(() => pullFromCloud(true), 30000);
}

// ══════════════════════════════════════════════════════
//  SETUP FLOW
// ══════════════════════════════════════════════════════
function loadCreds() {
  try { const r = localStorage.getItem(LS_CREDS); return r ? JSON.parse(r) : null; } catch(_) { return null; }
}

function saveCreds(c) {
  try { localStorage.setItem(LS_CREDS, JSON.stringify(c)); } catch(_) {}
}

function resetSetup() {
  if (!confirm("This will clear your saved API credentials from this device. Your data in the cloud stays safe. Continue?")) return;
  localStorage.removeItem(LS_CREDS);
  clearInterval(pollTimer);
  creds = null;
  renderSetup();
}

async function handleSetup() {
  const apiKey = document.getElementById("apikey-input").value.trim();
  const binId  = document.getElementById("binid-input").value.trim();
  const errEl  = document.getElementById("setup-error");
  const btn    = document.getElementById("setup-submit");

  errEl.style.display = "none";
  if (!apiKey) { showSetupError("Paste your Master API Key."); return; }

  btn.disabled = true;
  btn.textContent = "CONNECTING…";

  try {
    let resolvedBinId = binId;

    if (!resolvedBinId) {
      // Create a new bin with default data
      resolvedBinId = await createBin(apiKey, DEFAULT_DATA);
    } else {
      // Validate existing bin
      await readBin(apiKey, resolvedBinId);
    }

    creds = { apiKey, binId: resolvedBinId };
    saveCreds(creds);

    // Load data from cloud
    const remote = await readBin(apiKey, resolvedBinId);
    appState.tasks     = (remote && remote.tasks)     ? remote.tasks     : DEFAULT_DATA.tasks;
    appState.brainDump = (remote && remote.brainDump) ? remote.brainDump : DEFAULT_DATA.brainDump;
    cacheLocally({ tasks: appState.tasks, brainDump: appState.brainDump });

    render();
    setSyncStatus("saved");
    startPolling();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = "CONNECT & SYNC";
    showSetupError("Could not connect. Double-check your API key and Bin ID.");
  }
}

function showSetupError(msg) {
  const el = document.getElementById("setup-error");
  el.textContent = msg;
  el.style.display = "block";
}

// ══════════════════════════════════════════════════════
//  MUTATIONS
// ══════════════════════════════════════════════════════
function genId() { return Date.now() + Math.floor(Math.random() * 9999); }

function toggleTask(id, pool) {
  appState[pool] = appState[pool].map(t => t.id === id ? { ...t, done: !t.done } : t);
  scheduleSave(); render();
}

function deleteTask(id, pool) {
  appState[pool] = appState[pool].filter(t => t.id !== id);
  scheduleSave(); render();
}

function addTask(pool) {
  const input = document.getElementById(`add-input-${pool}`);
  const cat   = document.getElementById(`add-cat-${pool}`).value;
  const pri   = document.getElementById(`add-pri-${pool}`).value;
  const text  = (input.value || "").trim();
  if (!text) return;
  const task = { id: genId(), text, category: cat, priority: pri, done: false };
  if (pool === "todayDirect") {
    appState.tasks = [...appState.tasks, { ...task, today: true }];
  } else if (pool === "tasks") {
    appState.tasks = [...appState.tasks, { ...task, today: false }];
  } else {
    appState[pool] = [...appState[pool], task];
  }
  scheduleSave(); render();
}

function pullToDump(id) {
  const todayCount = appState.tasks.filter(t => t.today).length;
  if (todayCount >= 3) return;
  const task = appState.brainDump.find(t => t.id === id);
  if (!task) return;
  appState.brainDump = appState.brainDump.filter(t => t.id !== id);
  appState.tasks = [...appState.tasks, { ...task, today: true, done: false }];
  scheduleSave(); render();
}

function clearDone() {
  appState.brainDump = appState.brainDump.filter(t => !t.done);
  scheduleSave(); render();
}

function switchTab(tab) { appState.activeTab = tab; render(); }

function toggleReview(i) {
  const row  = document.getElementById(`rev-row-${i}`);
  const box  = document.getElementById(`rev-box-${i}`);
  const text = document.getElementById(`rev-txt-${i}`);
  if (!row) return;
  const on = row.classList.toggle("done-row");
  box.classList.toggle("checked", on);
  text.style.textDecoration = on ? "line-through" : "none";
}

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function colorForPri(p) { return p==="high"?"var(--danger)":p==="med"?"var(--accent)":"var(--muted)"; }
function tagHtml(cat) { return cat==="work" ? `<span class="tag tag-work">WORK</span>` : `<span class="tag tag-personal">PERSONAL</span>`; }
function priDotHtml(p) { return `<span class="priority-dot" style="background:${colorForPri(p)}"></span>`; }

function taskItemHtml(t, { showTag=true, pool="tasks" }={}) {
  return `
  <div class="task-item ${t.done?"done":""}" data-id="${t.id}">
    <button class="check-btn ${t.done?"checked":""}" onclick="toggleTask(${t.id},'${pool}')">
      <span class="check-icon">✓</span>
    </button>
    <span class="task-text">${esc(t.text)}</span>
    ${showTag ? tagHtml(t.category) : ""}
    ${t.priority ? priDotHtml(t.priority) : ""}
    <button class="del-btn" onclick="deleteTask(${t.id},'${pool}')">×</button>
  </div>`;
}

function addBarHtml(pool, defaultCat="work") {
  return `
  <div class="add-bar">
    <input class="add-input" id="add-input-${pool}" placeholder="Add task… (Enter to save)"
      onkeydown="if(event.key==='Enter')addTask('${pool}')" />
    <select class="add-select" id="add-cat-${pool}"
      style="color:${defaultCat==="work"?"var(--work)":"var(--personal)"}"
      onchange="this.style.color=this.value==='work'?'var(--work)':'var(--personal)'">
      <option value="work"     ${defaultCat==="work"?"selected":""}>WORK</option>
      <option value="personal" ${defaultCat==="personal"?"selected":""}>PERSONAL</option>
    </select>
    <select class="add-select" id="add-pri-${pool}" style="color:var(--muted)">
      <option value="high">HIGH</option>
      <option value="med" selected>MED</option>
      <option value="low">LOW</option>
    </select>
    <button class="add-btn" onclick="addTask('${pool}')">ADD</button>
  </div>`;
}

// ══════════════════════════════════════════════════════
//  TAB RENDERERS
// ══════════════════════════════════════════════════════
function renderTodayTab() {
  const today    = appState.tasks.filter(t => t.today);
  const done     = today.filter(t => t.done).length;
  const pct      = today.length ? Math.round((done/today.length)*100) : 0;
  const now      = new Date();
  const timeStr  = now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const dateStr  = now.toLocaleDateString([],{weekday:"long",month:"long",day:"numeric"});
  const canAdd   = today.length < 3;
  const dumpPend = appState.brainDump.filter(t => !t.done);

  return `
  <div class="clock-card">
    <div>
      <div class="clock" id="live-clock">${timeStr}</div>
      <div class="date-str">${dateStr}</div>
    </div>
    <div>
      <div class="pct">${pct}%</div>
      <div class="pct-sub">done today</div>
      <div class="pct-tags">
        <span style="font-size:11px;color:var(--work)">✦ ${today.filter(t=>t.done&&t.category==="work").length} work</span>
        <span style="font-size:11px;color:var(--personal)">✦ ${today.filter(t=>t.done&&t.category==="personal").length} personal</span>
      </div>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

  <div class="card">
    <div class="card-header">
      <span class="card-title accent">TODAY'S 3 — ${today.length}/3</span>
      ${canAdd?'<span style="font-size:11px;color:var(--muted)">Pull from Brain Dump ↓</span>':""}
    </div>
    ${today.length===0?'<div class="empty">No tasks yet. Pull from Brain Dump or add below.</div>':today.map(t=>taskItemHtml(t,{pool:"tasks"})).join("")}
    ${canAdd?addBarHtml("todayDirect"):""}
  </div>

  ${dumpPend.length>0&&canAdd?`
  <div class="card">
    <div class="card-header"><span class="card-title">PULL FROM BRAIN DUMP</span></div>
    ${dumpPend.slice(0,5).map(t=>`
    <div class="dump-row">
      <span style="flex:1;font-size:14px;color:var(--muted)">${esc(t.text)}</span>
      ${tagHtml(t.category)}
      <button class="pull-btn" onclick="pullToDump(${t.id})">→ TODAY</button>
    </div>`).join("")}
  </div>`:""}

  <div class="card">
    <div class="card-header"><span class="card-title">TIME ANCHORS</span></div>
    ${[
      {time:"8:00 AM",  label:"Morning anchor",  desc:"Pick your 3 tasks",      icon:"☀️"},
      {time:"12:00 PM", label:"Midday check-in",  desc:"2 min reprioritize",     icon:"⚡"},
      {time:"5:00 PM",  label:"End of day",       desc:"Hard stop. Close out.",  icon:"🔒"},
    ].map(a=>`
    <div class="anchor-row">
      <span style="font-size:20px">${a.icon}</span>
      <div><div style="font-size:14px;font-weight:600">${a.label}</div><div style="font-size:12px;color:var(--muted)">${a.desc}</div></div>
      <span class="anchor-time">${a.time}</span>
    </div>`).join("")}
  </div>`;
}

function renderBrainDumpTab() {
  const bd = appState.brainDump;
  const doneCount = bd.filter(t=>t.done).length;
  return `
  <div class="dump-header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:22px;font-weight:900;color:var(--accent);font-family:'DM Mono',monospace">BRAIN DUMP</div>
        <div style="color:var(--muted);font-size:13px;margin-top:4px">Don't filter. Just capture.</div>
      </div>
      ${doneCount>0?`<button class="clear-btn" onclick="clearDone()">CLEAR ${doneCount} DONE</button>`:""}
    </div>
    <div style="display:flex;gap:16px;margin-top:12px">
      <span style="font-size:12px;color:var(--work)">● ${bd.filter(t=>t.category==="work").length} work</span>
      <span style="font-size:12px;color:var(--personal)">● ${bd.filter(t=>t.category==="personal").length} personal</span>
      <span style="font-size:12px;color:var(--muted)">● ${doneCount} done</span>
    </div>
  </div>
  <div class="card">
    ${addBarHtml("brainDump")}
    ${bd.length===0?'<div class="empty">Empty. Start dumping everything from your head.</div>':bd.map(t=>taskItemHtml(t,{pool:"brainDump"})).join("")}
  </div>`;
}

function renderListTab(category) {
  const filtered = appState.tasks.filter(t=>t.category===category&&!t.today);
  const color = category==="work"?"var(--work)":"var(--personal)";
  const groups = {high:[],med:[],low:[]};
  filtered.forEach(t=>(groups[t.priority||"med"]||groups.med).push(t));
  return `
  <div class="cat-card" style="border-left:4px solid ${color}">
    <div style="font-size:22px;font-weight:900;color:${color};font-family:'DM Mono',monospace">${category.toUpperCase()}</div>
    <div style="color:var(--muted);font-size:13px;margin-top:4px">${filtered.length} tasks · ${filtered.filter(t=>t.done).length} done</div>
  </div>
  <div class="card">
    ${addBarHtml("tasks",category)}
    ${["high","med","low"].map(pri=>groups[pri].length>0?`
    <div class="pri-group-label">${priDotHtml(pri)} ${pri.toUpperCase()} PRIORITY</div>
    ${groups[pri].map(t=>taskItemHtml(t,{showTag:false,pool:"tasks"})).join("")}`:"").join("")}
    ${filtered.length===0?'<div class="empty">No tasks yet.</div>':""}
  </div>`;
}

function renderWeeklyTab() {
  const all = [...appState.tasks,...appState.brainDump];
  const pct = all.length?Math.round((all.filter(t=>t.done).length/all.length)*100):0;
  const wT  = appState.tasks.filter(t=>t.category==="work");
  const pT  = appState.tasks.filter(t=>t.category==="personal");
  const tips = [
    "10 min Sunday: sort Brain Dump → Work and Personal lists",
    "Check if any high-priority tasks are overdue",
    "Reset your 3 time anchor alarms",
    "Reflect: what kept derailing you last week?",
    "Clear done items from Brain Dump",
  ];
  return `
  <div class="weekly-header" style="border-left:4px solid var(--accent)">
    <div style="font-size:22px;font-weight:900;color:var(--text);font-family:'DM Mono',monospace">WEEKLY REVIEW</div>
    <div style="color:var(--muted);font-size:13px;margin-top:4px">Every Sunday or Monday morning. 10 minutes.</div>
    <div class="stats-row">
      <div><div class="stat-block" style="color:var(--accent)">${pct}%</div><div class="stat-label">overall</div></div>
      <div><div class="stat-block" style="color:var(--work)">${wT.filter(t=>t.done).length}/${wT.length}</div><div class="stat-label">work</div></div>
      <div><div class="stat-block" style="color:var(--personal)">${pT.filter(t=>t.done).length}/${pT.length}</div><div class="stat-label">personal</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">REVIEW CHECKLIST</span></div>
    ${tips.map((tip,i)=>`
    <div class="check-row" id="rev-row-${i}" onclick="toggleReview(${i})">
      <div class="check-btn" id="rev-box-${i}" style="cursor:pointer;flex-shrink:0"><span class="check-icon">✓</span></div>
      <span class="review-text" id="rev-txt-${i}">${tip}</span>
    </div>`).join("")}
  </div>
  <div class="reminders-card">
    <div style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:12px">ADHD REMINDERS</div>
    ${[
      {icon:"🧠",tip:"3 tasks max per day. Not 10. Three."},
      {icon:"⏱",tip:"Time blindness is real — use alarms, not willpower."},
      {icon:"👥",tip:"Body doubling: work near someone or use YouTube study streams."},
      {icon:"🔄",tip:"Transitions are hard. Give yourself 5 min between contexts."},
      {icon:"✅",tip:"Done > perfect. Messy progress beats perfect inaction."},
    ].map(r=>`
    <div class="reminder-row">
      <span style="font-size:16px">${r.icon}</span>
      <span style="font-size:13px;color:var(--muted)">${r.tip}</span>
    </div>`).join("")}
  </div>`;
}

// ══════════════════════════════════════════════════════
//  SETUP SCREEN
// ══════════════════════════════════════════════════════
function renderSetup() {
  document.getElementById("app").innerHTML = `
  <div class="setup-screen">
    <div class="setup-card">
      <div class="setup-logo">ADHD OS</div>
      <div class="setup-title">Connect Cloud Sync</div>
      <div class="setup-sub">Your data will sync instantly across every device — phone, laptop, Notion embed. Uses <strong style="color:var(--text)">JSONBin.io</strong> (free, takes 2 min to set up).</div>

      <div class="setup-steps">
        <div class="setup-step">
          <div class="step-num">1</div>
          <div class="step-text">Go to <a href="https://jsonbin.io" target="_blank">jsonbin.io</a> → sign up free → click <strong style="color:var(--text)">API Keys</strong> in the sidebar → copy your <strong style="color:var(--text)">Master Key</strong>.</div>
        </div>
        <div class="setup-step">
          <div class="step-num">2</div>
          <div class="step-text">Paste it below and hit <strong style="color:var(--text)">Connect</strong>. A new bin will be created automatically with your starter data.</div>
        </div>
        <div class="setup-step">
          <div class="step-num">3</div>
          <div class="step-text">On your other devices, paste the same API Key <em>and</em> the Bin ID that appears after connecting (shown in the header).</div>
        </div>
      </div>

      <div class="setup-field-label">MASTER API KEY</div>
      <input class="setup-input" id="apikey-input" type="password" placeholder="$2b$10$..." autocomplete="off" />

      <div class="setup-field-label">BIN ID <span style="font-weight:400;letter-spacing:0;text-transform:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px">(leave blank to create a new one)</span></div>
      <input class="setup-input" id="binid-input" type="text" placeholder="64abc123..." autocomplete="off" />

      <button class="setup-btn" id="setup-submit" onclick="handleSetup()">CONNECT &amp; SYNC</button>
      <div class="setup-error" id="setup-error"></div>
      <div class="setup-note">Your API key is stored only in this browser's localStorage — never sent anywhere except JSONBin's API.</div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════════════════════
let clockTick = null;
function render() {
  clearInterval(clockTick);
  const tabs = ["Today","Brain Dump","Work","Personal","Weekly Review"];
  const todayBadge = appState.tasks.filter(t=>t.today&&!t.done).length;
  const dumpBadge  = appState.brainDump.filter(t=>!t.done).length;
  const binId = creds ? creds.binId : "—";

  document.getElementById("app").innerHTML = `
  <div class="header">
    <div>
      <div class="logo">ADHD OS</div>
      <div class="logo-sub">your external brain</div>
    </div>
    <div class="spacer"></div>
    <span style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-right:4px" title="Bin ID — use this on other devices">${binId}</span>
    <div class="sync-badge" onclick="pullFromCloud()" title="Click to force sync">
      <span class="sync-dot" id="sync-dot" style="background:var(--done);box-shadow:0 0 5px var(--done)"></span>
      <span id="sync-lbl" style="color:var(--done)">SYNCED</span>
    </div>
    <span class="reset-link" onclick="resetSetup()" title="Change API key / switch bin">⚙</span>
  </div>

  <div class="tabs">
    ${tabs.map(tab=>{
      const b = tab==="Today"?todayBadge:tab==="Brain Dump"?dumpBadge:0;
      return `<button class="tab-btn ${appState.activeTab===tab?"active":""}" onclick="switchTab('${tab}')">
        ${tab.toUpperCase()}
        ${b>0?`<span class="badge">${b}</span>`:""}
      </button>`;
    }).join("")}
  </div>

  <div class="content">
    ${appState.activeTab==="Today"         ? renderTodayTab()         :
      appState.activeTab==="Brain Dump"    ? renderBrainDumpTab()     :
      appState.activeTab==="Work"          ? renderListTab("work")    :
      appState.activeTab==="Personal"      ? renderListTab("personal"):
      renderWeeklyTab()}
  </div>`;

  if (appState.activeTab === "Today") {
    clockTick = setInterval(()=>{ const el=document.getElementById("live-clock"); if(el) el.textContent=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }, 15000);
  }
}

// ══════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════
async function boot() {
  document.getElementById("app").innerHTML = `<div class="loading-screen"><div>LOADING…</div><div class="loading-sub">ADHD OS</div></div>`;

  creds = loadCreds();

  if (!creds) {
    renderSetup();
    return;
  }

  // Load from cache immediately so UI appears fast
  const cached = loadCache();
  if (cached) {
    appState.tasks     = cached.tasks     || DEFAULT_DATA.tasks;
    appState.brainDump = cached.brainDump || DEFAULT_DATA.brainDump;
  }

  render();
  setSyncStatus("syncing");

  // Then pull latest from cloud
  await pullFromCloud(false);
  startPolling();
}

window.addEventListener("online",  () => pullFromCloud(false));
window.addEventListener("offline", () => setSyncStatus("offline"));

boot();
</script>
</body>
</html>
